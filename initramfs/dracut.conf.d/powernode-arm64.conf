# Powernode dracut overlay for aarch64 / arm64.
# Reference: Golden Eclipse plan M3.

# ARM platform-specific block + serial drivers
add_drivers+=" dwc3 dwc3_pci sun50i_a64_pinctrl "

# RPi5 / generic SBC support
add_drivers+=" brcmfmac genet "

# Ampere Altra / Graviton class servers — typically use NVMe + ENA/MLX
add_drivers+=" mlx5_core ena "

# UART consoles common on ARM hardware (Pi serial, BMC)
add_drivers+=" pl011 8250_dw "
