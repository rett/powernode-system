schema_version: 1

name: system-base
display_name: "System Base (Ubuntu 24.04 minbase)"
description: "Minimal Ubuntu 24.04 LTS rootfs — systemd-networkd, openssh, powernode-agent runtime deps. Every smoke node depends on this."
license: "MIT"

mask:
  - "/var/cache/apt/**"
  - "/var/lib/apt/lists/**"
  - "/usr/share/doc/**"
  - "/usr/share/man/**"
  - "/usr/share/locale/**"
  - "/var/log/**"

file_spec:
  - "/etc/**"
  - "/usr/bin/**"
  - "/usr/sbin/**"
  - "/usr/lib/**"
  - "/lib/**"
  - "/sbin/**"
  - "/bin/**"

# Sensitive paths that NO higher-priority module may override at union mount.
# Build pipeline folds these into every higher neighbor's effective_mask, so
# their blobs cannot ship these files. Anything machine-identity, account
# policy, or trust-boundary lives here.
protected_spec:
  # Identity + account policy
  - "/etc/passwd"
  - "/etc/shadow"
  - "/etc/group"
  - "/etc/gshadow"
  - "/etc/sudoers"
  - "/etc/sudoers.d/**"
  # Authentication policy
  - "/etc/pam.d/**"
  - "/etc/security/**"
  - "/etc/login.defs"
  # SSH machine identity + policy
  - "/etc/ssh/sshd_config"
  - "/etc/ssh/sshd_config.d/**"
  - "/etc/ssh/ssh_host_*_key"
  - "/etc/ssh/ssh_host_*_key.pub"
  # Powernode-agent identity + binary
  - "/etc/systemd/system/powernode-agent.service"
  - "/usr/sbin/powernode-agent"
  - "/sbin/powernode-agent"
  # SUID trust boundary binaries
  - "/usr/bin/sudo"
  - "/usr/bin/su"
  - "/usr/sbin/sshd"

package_spec:
  - bash
  - coreutils
  - util-linux
  - systemd
  - systemd-sysv
  - systemd-networkd
  - systemd-resolved
  - dbus
  - iputils-ping
  - iproute2
  - openssh-server
  - ca-certificates
  - curl
  - dosfstools
  - kmod
  - udev

dependencies:
  requires: []
  provides:
    - base.os
    - net.systemd-networkd
    - sshd

init:
  start: "systemctl start systemd-networkd systemd-resolved ssh"
  stop:  "systemctl stop ssh"
  restart: ""

reboot_required: false

security:
  capabilities:
    - CAP_NET_ADMIN
    - CAP_NET_BIND_SERVICE
    - CAP_SYS_ADMIN
  egress_allow: []
  privileged: false
  user_namespace: false

skills: []

build:
  ubuntu_digest: null
  apt_snapshot: "20260415T000000Z"
