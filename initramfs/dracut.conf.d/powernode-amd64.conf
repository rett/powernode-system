# Powernode dracut overlay for x86_64 / amd64.
# Reference: Golden Eclipse plan M3.

# Hyper-V, VMware, and Azure-specific drivers
add_drivers+=" hyperv-vmbus hv_netvsc hv_storvsc vmw-pvscsi "

# Cloud network drivers (AWS ENA, GCP gVNIC, Azure Mellanox)
add_drivers+=" ena gve "

# Intel/AMD platform basics
add_drivers+=" i8042 atkbd ehci-pci "
