# Powernode baseline ulimits — protected_spec.
#
# Hard caps on per-user resource consumption. Service modules that need
# more (e.g. a database with many open files) override via a dependant
# child module, not by silently overlaying this file.

# Disable core dumps for everyone except root debugging.
* hard core 0
root soft core unlimited

# Cap open files at 65k for normal users; root gets 1M.
* soft nofile 32768
* hard nofile 65536
root soft nofile 524288
root hard nofile 1048576

# Process count cap to limit fork-bomb damage.
* soft nproc 8192
* hard nproc 16384
root soft nproc unlimited
root hard nproc unlimited
