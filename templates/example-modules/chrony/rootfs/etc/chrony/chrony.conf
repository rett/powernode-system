# Powernode chrony configuration.
#
# This file is on the protected_spec list — once shipped, no higher-priority
# module may override it. To change NTP sources for a particular fleet,
# create a child module with a config-variety override and set its parent
# to this module.

# Use the public pool and Cloudflare's anycast as belt-and-suspenders.
pool pool.ntp.org iburst maxsources 4
server time.cloudflare.com iburst

# Tracker / drift state.
driftfile /var/lib/chrony/drift

# Allow the system clock to be stepped during the first three updates if
# its offset is larger than 1 second.
makestep 1.0 3

# Get TAI-UTC offset and leap seconds from the system tz database.
leapsectz right/UTC

# Serve time only on loopback by default — operators opt-in to LAN-serving
# via a child module override.
allow 127.0.0.0/8

# Log on each clock adjustment, so fleet observability can correlate.
logchange 0.5
