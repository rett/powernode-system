schema_version: 1

name: chrony
display_name: "chrony (time sync)"
description: "Chrony NTP client for accurate time. Sits priority 30 — between system-base (10) and service modules (50+) — so its config replaces system-base's stub but doesn't get clobbered by services."
license: "MIT"

mask:
  - "/var/cache/apt/**"
  - "/var/lib/apt/lists/**"
  - "/usr/share/doc/**"
  - "/usr/share/man/**"
  - "/var/log/chrony/**"

file_spec:
  - "/etc/chrony/**"
  - "/usr/sbin/chronyd"
  - "/usr/bin/chronyc"
  - "/lib/systemd/system/chrony.service"
  - "/lib/systemd/system/chronyd.service"
  - "/etc/systemd/system/chrony.service.d/**"

# chrony.conf carries NTP server policy. A higher-priority service
# module shipping a different chrony.conf would silently change the
# trust anchor for clock skew detection — a real exploitation vector.
# We lock it down here.
protected_spec:
  - "/etc/chrony/chrony.conf"
  - "/etc/chrony/conf.d/**"
  - "/etc/chrony/sources.d/**"

package_spec:
  - chrony

dependencies:
  requires:
    - powernode/system-base@^1.0
  provides:
    - time.sync
    - time.ntp-client

init:
  start:   "systemctl start chrony"
  stop:    "systemctl stop chrony"
  restart: "systemctl restart chrony"

reboot_required: false

security:
  capabilities:
    - CAP_SYS_TIME
    - CAP_NET_BIND_SERVICE
  egress_allow:
    - "pool.ntp.org:123"
    - "time.cloudflare.com:123"
  privileged: false
  user_namespace: false

skills: []

build:
  apt_snapshot: "20260415T000000Z"
