# Powernode shared dracut configuration.
# Per-architecture overlays live in powernode-{amd64,arm64}.conf.
#
# Reference: Golden Eclipse plan M3 — initramfs builder.

# Compress with zstd — produces ~30% smaller cpio than gzip and decompresses
# fast enough for boot.
compress="zstd"

# Hostonly = no — these initramfs images must boot on any compatible
# hardware, not just the build host.
hostonly="no"
hostonly_cmdline="no"

# Powernode custom module embeds the agent binary and the boot init script.
# Listed explicitly in build.sh's --modules flag, but reaffirmed here so
# direct dracut invocations also pull it in.
add_dracutmodules+=" powernode "

# Universal kernel module set — anything that might be needed to find a
# rootfs, mount /var, or talk to the platform. Per-arch additions below.
add_drivers+=" overlay composefs dm-verity fs-verity "
add_drivers+=" virtio_net virtio_blk virtio_scsi virtio_console "
add_drivers+=" e1000 igb ixgbe mlx5_core "
add_drivers+=" nvme xhci_hcd ahci ext4 vfat "
# qemu_fw_cfg exposes the QEMU virtio-fw-cfg device under /sys/firmware/.
# The agent's identity package reads bootstrap_token / instance_uuid /
# platform_url / ca_pem from there on first boot under libvirt/QEMU.
# Use force_drivers (not add_drivers) — dracut's auto-detection skips
# qemu_fw_cfg since it's not a "boot-essential" driver per its heuristics.
force_drivers+=" qemu_fw_cfg "

# Filesystems
filesystems+=" ext4 vfat overlay composefs "

# Kernel command-line additions enforced at boot time.
# - lockdown=integrity: no module loading except signed
# - ima_appraise=enforce: kernel verifies file integrity
# - powernode.boot=1: signal to powernode-agent that it should run init flow
kernel_cmdline+=" lockdown=integrity ima_appraise=enforce ima_template=ima-ng powernode.boot=1 "

# Don't strip — symbols help debugging boot failures on real hardware.
do_strip="no"

# Skip files we don't need — saves ~10MB of initramfs size.
omit_dracutmodules+=" plymouth bootchart memstrack "

# Don't auto-include locale or fonts.
i18n_install_all="no"
