name: build-disk-image

# Builds operator-flashable disk images for the physical-device claim
# flow. Two artifacts:
#   - powernode-rpi4.img      (RPi 4: MBR + FAT32 boot + ext4 persist)
#   - powernode-arm64-uefi.img (Pi 5 / Ampere / generic UEFI arm64)
#
# Plan: docs/plans/wondrous-yawning-anchor.md §3.
#
# Pipeline:
#   1. Build the rpi4-firmware module (fetches Broadcom blobs at pinned ref)
#   2. Build kernel + initramfs (existing kernel-initrd variant)
#   3. Run build-disk-image-rpi4.sh + build-disk-image-arm64-uefi.sh
#   4. Compute SHA-256, cosign-sign, upload to FileStorageService via
#      the platform's worker_api/disk_images endpoint
#
# Trigger: tag push or manual dispatch. Runs on a privileged Gitea runner
# (the runner needs losetup + mount + sudo for filesystem creation).

on:
  push:
    tags:
      - 'system-disk-image/v*'
  workflow_dispatch:
    inputs:
      platform_url:
        description: "Platform URL to bake into identity.cfg"
        required: true
        default: "https://platform.example.com"
        type: string
      ca_pem_url:
        description: "URL of the platform CA chain to embed"
        required: false
        type: string
      firmware_ref:
        description: "raspberrypi/firmware ref (overrides manifest default)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04-privileged   # custom runner label — must allow loop devices

    env:
      PLATFORM_URL: ${{ inputs.platform_url || 'https://platform.example.com' }}
      ARCH: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dosfstools e2fsprogs sgdisk \
            buildah podman cosign \
            curl jq zstd

      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Stage cross-compiled powernode-agent (arm64)
        run: |
          mkdir -p extensions/system/initramfs/scripts
          ARCH_OUT="extensions/system/initramfs/scripts/powernode-agent-arm64"
          if [ -z "${POWERNODE_AGENT_BINARY_URL:-}" ]; then
            echo "WARN: POWERNODE_AGENT_BINARY_URL not set — using placeholder shim"
            cat >"$ARCH_OUT" <<'SHIM'
          #!/bin/sh
          echo "[powernode-shim] powernode-agent placeholder"
          exec /bin/sh
          SHIM
          else
            curl -fsSL "$POWERNODE_AGENT_BINARY_URL" -o "$ARCH_OUT"
          fi
          chmod +x "$ARCH_OUT"
        env:
          POWERNODE_AGENT_BINARY_URL: ${{ secrets.POWERNODE_AGENT_BINARY_URL }}

      - name: Build rpi4-firmware module rootfs
        run: |
          cd extensions/system/templates/example-modules/rpi4-firmware
          FIRMWARE_REF="${{ inputs.firmware_ref }}"
          if [ -z "$FIRMWARE_REF" ]; then
            FIRMWARE_REF="$(grep firmware_ref manifest.yaml | awk '{print $2}' | tr -d '"')"
          fi
          echo "Building rpi4-firmware at ref=$FIRMWARE_REF"
          buildah bud \
            --platform linux/arm64 \
            --build-arg "FIRMWARE_REF=${FIRMWARE_REF}" \
            -t rpi4-firmware:local \
            .
          # Extract the rootfs to a host-accessible path for the disk-image build.
          ctr=$(buildah from rpi4-firmware:local)
          buildah unshare buildah copy --no-such-flag-just-use-mount-instead "$ctr" / /tmp/rpi4-firmware-rootfs 2>/dev/null || true
          # Fallback: use podman container export (simpler).
          podman create --name rpi4-fw rpi4-firmware:local
          mkdir -p /tmp/rpi4-firmware-rootfs
          podman cp rpi4-fw:/rootfs /tmp/rpi4-firmware-rootfs
          podman rm rpi4-fw
          echo "Firmware files:"
          ls -la /tmp/rpi4-firmware-rootfs/rootfs/boot/firmware/ | head

      - name: Fetch platform CA
        if: inputs.ca_pem_url != ''
        run: |
          curl -fsSL "${{ inputs.ca_pem_url }}" -o /tmp/platform-ca.pem
          echo "CA fingerprint:"
          openssl x509 -in /tmp/platform-ca.pem -noout -fingerprint -sha256 || true

      - name: Build kernel + initramfs (arm64)
        working-directory: extensions/system/initramfs
        run: |
          ./build.sh --arch arm64 --variants kernel-initrd

      - name: Build disk-image-rpi4
        working-directory: extensions/system/initramfs
        env:
          RPI4_FIRMWARE_DIR: /tmp/rpi4-firmware-rootfs/rootfs/boot/firmware
          CA_PEM_FILE: ${{ inputs.ca_pem_url != '' && '/tmp/platform-ca.pem' || '' }}
        run: |
          ./build.sh --arch arm64 --variants disk-image-rpi4

      - name: Build disk-image-arm64-uefi
        working-directory: extensions/system/initramfs
        env:
          CA_PEM_FILE: ${{ inputs.ca_pem_url != '' && '/tmp/platform-ca.pem' || '' }}
        run: |
          ./build.sh --arch arm64 --variants disk-image-arm64-uefi

      - name: Cosign sign disk images (keyless, Fulcio)
        working-directory: extensions/system/initramfs/build/arm64
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for img in disk-image-rpi4/powernode-rpi4.img disk-image-arm64-uefi/powernode-arm64-uefi.img; do
            if [ -f "$img" ]; then
              cosign sign-blob --yes --bundle "${img}.cosign-bundle" "$img" \
                || echo "WARN: signing failed for $img"
            fi
          done

      - name: Compute manifest
        working-directory: extensions/system/initramfs/build/arm64
        run: |
          {
            echo "platform_url=${PLATFORM_URL}"
            echo "git_sha=${{ github.sha }}"
            echo "built_at=$(date -Iseconds)"
            for img in disk-image-rpi4/powernode-rpi4.img disk-image-arm64-uefi/powernode-arm64-uefi.img; do
              if [ -f "$img" ]; then
                echo "$(sha256sum "$img")"
                echo "size_$(basename "$img")=$(stat -c '%s' "$img")"
              fi
            done
          } >disk-image-manifest.txt
          cat disk-image-manifest.txt

      # ─── Disk-image registration with the platform (Phase 2 — Chunk 4) ───
      # Plan: docs/plans/wondrous-yawning-anchor.md.
      #
      # Three modes:
      #  1. Push to OCI registry (oras) with cosign sign-blob + cosign attest-blob
      #     for the publication payload. Default for all builds — needed even when
      #     the platform notify is skipped, so the artifact is durably stored.
      #  2. HMAC webhook to platform (default) — operator's CI provides
      #     POWERNODE_DISK_IMAGE_WEBHOOK_URL + POWERNODE_DISK_IMAGE_WEBHOOK_SECRET
      #     pointing at /api/v1/system/webhooks/disk_image/built/:webhook_id.
      #     Platform pulls from OCI, verifies cosign + attestation, registers.
      #  3. Cloud-direct upload (S3/Azure/GCS only) — POWERNODE_STORAGE_MODE=cloud-direct.
      #     CI uploads bytes directly to storage backend via signed PUT URL.
      #     Avoids OCI registry pull on the platform side.

      - name: Push disk images to OCI registry (cosign-signed + attested)
        if: env.POWERNODE_STORAGE_MODE != 'cloud-direct'
        env:
          ORAS_REGISTRY: ${{ secrets.POWERNODE_REGISTRY_HOST || 'git.ipnode.org' }}
          POWERNODE_REGISTRY_USER: ${{ secrets.POWERNODE_REGISTRY_USER }}
          POWERNODE_REGISTRY_TOKEN: ${{ secrets.POWERNODE_REGISTRY_TOKEN }}
        run: |
          if [ -n "$POWERNODE_REGISTRY_USER" ] && [ -n "$POWERNODE_REGISTRY_TOKEN" ]; then
            oras login -u "$POWERNODE_REGISTRY_USER" -p "$POWERNODE_REGISTRY_TOKEN" "$ORAS_REGISTRY" || true
          fi

          for entry in "ubuntu-24.04-rpi4:disk-image-rpi4/powernode-rpi4.img" \
                       "ubuntu-24.04-arm64-uefi:disk-image-arm64-uefi/powernode-arm64-uefi.img"; do
            platform="${entry%%:*}"
            img="extensions/system/initramfs/build/arm64/${entry#*:}"
            [ -f "$img" ] || continue

            sha="$(sha256sum "$img" | awk '{print $1}')"
            size="$(stat -c '%s' "$img")"
            ref="$ORAS_REGISTRY/powernode/disk-images/$platform:${{ github.sha }}"

            # 1. Sign blob (signature on the bytes themselves)
            cosign sign-blob --yes --bundle "$img.cosign-bundle" "$img" || echo "WARN: cosign sign-blob failed for $img"

            # 2. Attest payload (signature on the publication metadata —
            #    catches webhook-payload tampering even if HMAC was leaked).
            cat >/tmp/payload-${platform}.json <<EOF
          {
            "platform_name": "$platform",
            "sha256":        "$sha",
            "size_bytes":    $size,
            "git_sha":       "${{ github.sha }}",
            "firmware_ref":  "${{ inputs.firmware_ref }}",
            "oci_ref":       "$ref",
            "arch":          "arm64",
            "built_at":      "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
            cosign attest-blob --yes --predicate /tmp/payload-${platform}.json \
              --bundle "$img.attestation-bundle" "$img" || echo "WARN: cosign attest-blob failed for $img"

            # 3. Push everything to OCI registry as a single artifact.
            oras push "$ref" \
              --artifact-type application/vnd.powernode.disk-image.v1 \
              "$img:application/octet-stream" \
              "$img.cosign-bundle:application/vnd.dev.cosign.bundle.v1+json" \
              "$img.attestation-bundle:application/vnd.dev.cosign.attestation.v1+json" \
              || echo "WARN: oras push failed for $platform"

            echo "✓ Pushed $platform to $ref (sha=$sha size=$size)"
          done

      - name: Notify platform of new disk images (HMAC webhook — OCI-pull mode)
        if: env.POWERNODE_DISK_IMAGE_WEBHOOK_URL != '' && env.POWERNODE_STORAGE_MODE != 'cloud-direct'
        env:
          POWERNODE_DISK_IMAGE_WEBHOOK_URL: ${{ secrets.POWERNODE_DISK_IMAGE_WEBHOOK_URL }}
          POWERNODE_DISK_IMAGE_WEBHOOK_SECRET: ${{ secrets.POWERNODE_DISK_IMAGE_WEBHOOK_SECRET }}
          ORAS_REGISTRY: ${{ secrets.POWERNODE_REGISTRY_HOST || 'git.ipnode.org' }}
        run: |
          for entry in "ubuntu-24.04-rpi4:disk-image-rpi4/powernode-rpi4.img" \
                       "ubuntu-24.04-arm64-uefi:disk-image-arm64-uefi/powernode-arm64-uefi.img"; do
            platform="${entry%%:*}"
            img="extensions/system/initramfs/build/arm64/${entry#*:}"
            [ -f "$img" ] || continue

            sha="$(sha256sum "$img" | awk '{print $1}')"
            size="$(stat -c '%s' "$img")"
            ref="$ORAS_REGISTRY/powernode/disk-images/$platform:${{ github.sha }}"

            body=$(jq -nc \
              --arg p "$platform" \
              --arg ref "$ref" \
              --arg sha "$sha" \
              --arg gs "${{ github.sha }}" \
              --arg fr "${{ inputs.firmware_ref }}" \
              --argjson sz "$size" \
              --arg arch "arm64" \
              '{platform_name:$p, oci_ref:$ref, sha256:$sha, size_bytes:$sz,
                git_sha:$gs, firmware_ref:$fr, arch:$arch}')

            sig=$(printf %s "$body" | openssl dgst -sha256 -hmac "$POWERNODE_DISK_IMAGE_WEBHOOK_SECRET" -hex \
                  | awk '{print $2}')

            echo "→ Notifying platform: $POWERNODE_DISK_IMAGE_WEBHOOK_URL"
            curl -fsSL -X POST "$POWERNODE_DISK_IMAGE_WEBHOOK_URL" \
              -H "X-Powernode-Signature: sha256=$sig" \
              -H "Content-Type: application/json" \
              -d "$body" \
              || echo "WARN: webhook POST failed for $platform"
          done

      - name: Direct-upload disk images (cloud-install mode)
        if: env.POWERNODE_STORAGE_MODE == 'cloud-direct' && env.POWERNODE_CI_WORKER_TOKEN != ''
        env:
          POWERNODE_API_BASE: ${{ secrets.POWERNODE_API_BASE }}
          POWERNODE_CI_WORKER_TOKEN: ${{ secrets.POWERNODE_CI_WORKER_TOKEN }}
        run: |
          for entry in "ubuntu-24.04-rpi4:disk-image-rpi4/powernode-rpi4.img" \
                       "ubuntu-24.04-arm64-uefi:disk-image-arm64-uefi/powernode-arm64-uefi.img"; do
            platform="${entry%%:*}"
            img="extensions/system/initramfs/build/arm64/${entry#*:}"
            [ -f "$img" ] || continue

            sha="$(sha256sum "$img" | awk '{print $1}')"
            size="$(stat -c '%s' "$img")"

            # Phase 1: initiate (returns presigned PUT URL + publication_id)
            init=$(curl -fsSL -X POST "$POWERNODE_API_BASE/api/v1/system/worker_api/disk_image_publications/initiate" \
              -H "X-Worker-Token: $POWERNODE_CI_WORKER_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"platform_name\":\"$platform\",\"sha256\":\"$sha\",\"size_bytes\":$size,\"git_sha\":\"${{ github.sha }}\",\"arch\":\"arm64\",\"firmware_ref\":\"${{ inputs.firmware_ref }}\"}")
            pub_id=$(echo "$init" | jq -r .data.publication_id)
            url=$(echo "$init" | jq -r .data.signed_upload_url)

            # Phase 2: PUT bytes directly to storage backend
            curl -fsSL -X PUT "$url" \
              --data-binary "@$img" \
              -H "Content-Type: application/octet-stream"

            # Phase 3: finalize (verify SHA + cosign + flip platform pointer)
            curl -fsSL -X POST "$POWERNODE_API_BASE/api/v1/system/worker_api/disk_image_publications/finalize" \
              -H "X-Worker-Token: $POWERNODE_CI_WORKER_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"publication_id\":\"$pub_id\",\"sha256_verify\":\"$sha\"}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: powernode-disk-images-${{ github.sha }}
          path: |
            extensions/system/initramfs/build/arm64/disk-image-rpi4/
            extensions/system/initramfs/build/arm64/disk-image-arm64-uefi/
            extensions/system/initramfs/build/arm64/disk-image-manifest.txt
          retention-days: 30
