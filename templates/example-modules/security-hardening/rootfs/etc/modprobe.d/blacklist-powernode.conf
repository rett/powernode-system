# Powernode kernel-module blacklist — protected_spec.
#
# Filesystems and protocols the platform never uses, but which have been
# vectors for kernel exploits. Disabling them shrinks attack surface.

# Old / rare filesystems
install cramfs /bin/true
install freevxfs /bin/true
install jffs2 /bin/true
install hfs /bin/true
install hfsplus /bin/true
install squashfs /bin/false
install udf /bin/true

# Network protocols not in use
install dccp /bin/true
install sctp /bin/true
install rds /bin/true
install tipc /bin/true

# USB storage by default — operators opt in via dependant override
install usb-storage /bin/true
