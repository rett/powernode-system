# Minimal NSS config for the Powernode initramfs.
# Files-only for credentials (passwd/group/shadow); files+dns for hosts so
# systemd-resolved + /etc/hosts both work. No systemd userdb (we don't ship
# systemd-userdbd), no LDAP/SSS.

passwd:         files
group:          files
shadow:         files
gshadow:        files

hosts:          files dns
networks:       files

protocols:      files
services:       files
ethers:         files
rpc:            files
