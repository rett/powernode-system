# Powernode platform-specific Postgres overrides. Layered on top of
# the Debian postgresql.conf via `include_dir = 'conf.d'`.
#
# Tunings here are for the platform's expected workload: 1–4 vCPU
# Rails API + Sidekiq workers, all reading/writing through one PG
# instance. Adjust for larger deployments by writing operator-side
# overrides as a config-variety dependant module — those land in
# the same conf.d dir at higher effective_priority.

listen_addresses = '*'
port = 5432

# Connection pool sized to: Rails Puma (2 procs × 5 threads) +
# Sidekiq worker (25 threads) + Sidekiq-cron + ~10 admin headroom.
max_connections = 100

# WAL on the durable mount so a crash recovers cleanly. The
# orchestrator mounts /var/lib/postgresql onto the NFS/block volume
# bound at deployment time (see PlatformDeploymentOrchestrator).
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Logging routed to stderr so journalctl picks it up via the
# systemd unit (the agent's lifecycle package handles unit creation).
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 250ms

# Lock+TZ settings for predictable behavior across regions.
timezone = 'UTC'
log_timezone = 'UTC'
default_text_search_config = 'pg_catalog.english'
