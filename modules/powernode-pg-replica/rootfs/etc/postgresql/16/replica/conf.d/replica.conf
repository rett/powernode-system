# Powernode pg-replica overrides. Replication slot + primary
# connection string are injected at spawn time via virtio-fw-cfg
# (see Federation::SpawnProvisioner). This file declares the
# replica-mode invariants that don't change per deployment.

listen_addresses = '*'
port = 5433

# Hot-standby + read-only: the replica accepts client connections
# but rejects writes. Promotion to primary requires operator action
# (or PG Replica Manager AI when implemented).
hot_standby = on

# Streaming replication: connect to the primary defined in
# primary_conninfo (set by the spawn-provisioner override).
wal_level = replica
max_wal_senders = 4
max_replication_slots = 4

# Conservative: keep at least the most recent 1GB of WAL for the
# primary to feed us. wal_keep_size is on the primary; on the
# replica we tune recovery_min_apply_delay = 0 (no lag intentionally
# added).
recovery_min_apply_delay = 0

timezone = 'UTC'
log_timezone = 'UTC'
log_destination = 'stderr'
logging_collector = off
