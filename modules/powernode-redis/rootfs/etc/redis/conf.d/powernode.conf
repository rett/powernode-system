# Powernode platform Redis overrides. Loaded via `include` directives
# at the bottom of /etc/redis/redis.conf (debian default reads conf.d).
#
# This Redis hosts three logically-separate workloads — Sidekiq queues
# (db 0), ActionCable pub/sub (db 1), Rails cache (db 2). DB separation
# is per-client convention; only one daemon runs.

bind 0.0.0.0 -::1
protected-mode no  # Platform-owned network; access scoped via VIP + firewall.
port 6379

# 512 MB hard cap is plenty for the platform's queues + cache; if the
# Rails cache fills it, evict allkeys-lru rather than crash Sidekiq.
maxmemory 512mb
maxmemory-policy allkeys-lru

# AOF persistence so Sidekiq doesn't lose jobs across restarts. Sidekiq
# queues are deduplicated at the app layer so any-redundant-replay is
# operator-tolerable, but losing a queued cancellation is not.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Don't dump to RDB — AOF is canonical. Setting save to empty disables.
save ""
