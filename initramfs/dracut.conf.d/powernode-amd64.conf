# Powernode dracut overlay for x86_64 / amd64.
# Reference: Golden Eclipse plan M3.
#
# Module names follow the kernel's actual export names (post-6.x). dracut's
# dracut-install fails the entire batch when any module in `-m` is missing,
# so this list is curated to only include drivers that exist in the build
# host's running kernel. Built-in drivers (i8042, atkbd, ehci-pci on most
# distro kernels) are not loadable modules and must NOT be listed.

# Hyper-V, VMware, and Azure-specific drivers (renamed: hyperv_vmbus → hv_vmbus)
add_drivers+=" hv_vmbus hv_netvsc hv_storvsc vmw_pvscsi "

# Cloud network drivers (AWS ENA, GCP gVNIC)
add_drivers+=" ena gve "
